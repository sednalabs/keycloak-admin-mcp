name: comprehensive-sarif

on:
  pull_request:
    branches:
      - main
  merge_group:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: "17 4 * * 2"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: comprehensive-sarif::${{ github.ref }}
  cancel-in-progress: true

jobs:
  trivy-filesystem:
    name: Trivy filesystem SARIF
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        # actions/checkout v6
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Prepare SARIF output directory
        run: mkdir -p sarif

      - name: Run Trivy filesystem scan
        # aquasecurity/trivy-action v0.36.0
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: sarif/trivy-filesystem.sarif
          scanners: vuln,misconfig,secret,license
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
          ignore-unfixed: "false"
          exit-code: "0"

      - name: Upload Trivy SARIF to GitHub code scanning
        # github/codeql-action v4
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a
        with:
          sarif_file: sarif/trivy-filesystem.sarif
          category: trivy/filesystem

      - name: Upload Trivy SARIF artifact
        # actions/upload-artifact v7
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: trivy-filesystem-sarif
          path: sarif/trivy-filesystem.sarif
          if-no-files-found: error
