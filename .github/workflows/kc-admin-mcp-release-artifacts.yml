name: kc-admin-mcp-release-artifacts

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/kc-admin-mcp-release-artifacts.yml"
      - "kc-admin-gateway/**"
      - "kc-admin-mcp/**"
      - "Cargo.lock"
      - "Cargo.toml"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/kc-admin-mcp-release-artifacts.yml"
      - "kc-admin-gateway/**"
      - "kc-admin-mcp/**"
      - "Cargo.lock"
      - "Cargo.toml"
  workflow_dispatch:

concurrency:
  group: kc-admin-mcp-release-artifacts::${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-artifacts:
    name: Build Linux x86_64 artifacts
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        # actions/checkout v6
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Install Rust toolchain
        # dtolnay/rust-toolchain stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

      - name: Cache cargo artifacts
        # Swatinem/rust-cache v2
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          shared-key: kc-admin-mcp-release-artifacts-${{ runner.os }}
          cache-on-failure: true

      - name: Fetch locked dependencies
        run: cargo fetch --locked

      - name: Install cargo-cyclonedx
        run: cargo install --locked --version 0.5.9 cargo-cyclonedx

      - name: Build release binaries
        run: cargo build --locked --release --bin kc-admin-gateway --bin kc-admin-mcp

      - name: Generate target-specific CycloneDX SBOMs
        shell: bash
        run: |
          set -euo pipefail

          target="x86_64-unknown-linux-gnu"
          mkdir -p dist

          generate_sbom() {
            local crate_name="$1"

            cargo cyclonedx \
              --manifest-path "${crate_name}/Cargo.toml" \
              --format json \
              --spec-version 1.5 \
              --describe binaries \
              --no-build-deps \
              --target "$target" \
              --target-in-filename

            install -m 0644 \
              "${crate_name}/${crate_name}_bin_${target}.cdx.json" \
              "dist/${crate_name}.${target}.cdx.json"
          }

          generate_sbom kc-admin-gateway
          generate_sbom kc-admin-mcp

      - name: Stage artifacts
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist
          install -m 0755 target/release/kc-admin-gateway dist/kc-admin-gateway
          install -m 0755 target/release/kc-admin-mcp dist/kc-admin-mcp

          toolkit_rev="$(
            sed -n '/name = "mcp-toolkit-core"/,/^\[\[package\]\]/p' Cargo.lock \
              | sed -n 's/^source = ".*rev=\([0-9a-f]\{40\}\).*$/\1/p' \
              | head -n 1
          )"
          if [[ -z "$toolkit_rev" ]]; then
            echo "Unable to derive mcp-toolkit-rs revision from Cargo.lock" >&2
            exit 1
          fi

          (
            cd dist
            {
              echo "repository=${{ github.repository }}"
              echo "ref=${{ github.ref }}"
              echo "sha=${{ github.sha }}"
              echo "workflow=${{ github.workflow }}"
              echo "run_id=${{ github.run_id }}"
              echo "run_attempt=${{ github.run_attempt }}"
              echo "toolkit_rev=$toolkit_rev"
              echo "target=x86_64-unknown-linux-gnu"
              echo "sbom_generator=cargo-cyclonedx@0.5.9"
            } > BUILD_PROVENANCE
            sha256sum \
              kc-admin-gateway \
              kc-admin-mcp \
              kc-admin-gateway.x86_64-unknown-linux-gnu.cdx.json \
              kc-admin-mcp.x86_64-unknown-linux-gnu.cdx.json \
              BUILD_PROVENANCE \
              > SHA256SUMS
          )

          {
            echo "### Keycloak Admin MCP release artifacts"
            echo
            echo "- Repository: ${{ github.repository }}"
            echo "- Commit: ${{ github.sha }}"
            echo "- Toolkit rev: $toolkit_rev"
            echo
            echo "#### SHA256"
            echo
            sed 's/^/- `/' dist/SHA256SUMS | sed 's/$/`/'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload release artifact bundle
        # actions/upload-artifact v7
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: keycloak-admin-mcp-linux-x86_64
          path: dist/
          if-no-files-found: error
          retention-days: 14

  attest-artifacts:
    name: Attest Linux x86_64 artifacts
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    needs: build-artifacts
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Download same-run artifact bundle
        # actions/download-artifact v8.0.1
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: keycloak-admin-mcp-linux-x86_64
          path: dist

      - name: Verify artifact checksums
        shell: bash
        run: |
          set -euo pipefail

          test -s dist/kc-admin-gateway
          test -s dist/kc-admin-mcp
          test -s dist/kc-admin-gateway.x86_64-unknown-linux-gnu.cdx.json
          test -s dist/kc-admin-mcp.x86_64-unknown-linux-gnu.cdx.json
          (
            cd dist
            sha256sum --check --strict SHA256SUMS
          )

      - name: Attest kc-admin-gateway build provenance
        # actions/attest v4.1.1
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6
        with:
          subject-path: dist/kc-admin-gateway

      - name: Attest kc-admin-gateway SBOM
        # actions/attest v4.1.1
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6
        with:
          subject-path: dist/kc-admin-gateway
          sbom-path: dist/kc-admin-gateway.x86_64-unknown-linux-gnu.cdx.json

      - name: Attest kc-admin-mcp build provenance
        # actions/attest v4.1.1
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6
        with:
          subject-path: dist/kc-admin-mcp

      - name: Attest kc-admin-mcp SBOM
        # actions/attest v4.1.1
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6
        with:
          subject-path: dist/kc-admin-mcp
          sbom-path: dist/kc-admin-mcp.x86_64-unknown-linux-gnu.cdx.json
