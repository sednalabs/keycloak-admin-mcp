name: kc-admin-mcp-release-artifacts

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/kc-admin-mcp-release-artifacts.yml"
      - "kc-admin-gateway/**"
      - "kc-admin-mcp/**"
      - "Cargo.lock"
      - "Cargo.toml"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/kc-admin-mcp-release-artifacts.yml"
      - "kc-admin-gateway/**"
      - "kc-admin-mcp/**"
      - "Cargo.lock"
      - "Cargo.toml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: kc-admin-mcp-release-artifacts::${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-artifacts:
    name: Build Linux x86_64 artifacts
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        # actions/checkout v6
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Install Rust toolchain
        # dtolnay/rust-toolchain stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

      - name: Cache cargo artifacts
        # Swatinem/rust-cache v2
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          shared-key: kc-admin-mcp-release-artifacts-${{ runner.os }}
          cache-on-failure: true

      - name: Fetch locked dependencies
        run: cargo fetch --locked

      - name: Build release binaries
        run: cargo build --locked --release --bin kc-admin-gateway --bin kc-admin-mcp

      - name: Stage artifacts
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist
          install -m 0755 target/release/kc-admin-gateway dist/kc-admin-gateway
          install -m 0755 target/release/kc-admin-mcp dist/kc-admin-mcp

          (
            cd dist
            sha256sum kc-admin-gateway kc-admin-mcp > SHA256SUMS
            {
              echo "repository=${{ github.repository }}"
              echo "ref=${{ github.ref }}"
              echo "sha=${{ github.sha }}"
              echo "workflow=${{ github.workflow }}"
              echo "run_id=${{ github.run_id }}"
              echo "run_attempt=${{ github.run_attempt }}"
              echo "toolkit_rev=6a39174efeb40462eecdf8458c8ff41cfac51b52"
            } > BUILD_PROVENANCE
          )

          {
            echo "### Keycloak Admin MCP release artifacts"
            echo
            echo "- Repository: ${{ github.repository }}"
            echo "- Commit: ${{ github.sha }}"
            echo "- Toolkit rev: 6a39174efeb40462eecdf8458c8ff41cfac51b52"
            echo
            echo "#### SHA256"
            echo
            sed 's/^/- `/' dist/SHA256SUMS | sed 's/$/`/'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload release artifact bundle
        # actions/upload-artifact v7
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: keycloak-admin-mcp-linux-x86_64
          path: dist/
          if-no-files-found: error
          retention-days: 14
